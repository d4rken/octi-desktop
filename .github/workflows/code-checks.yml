name: Code tests & eval

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # Cross-OS matrix is intentional — the desktop's crypto stack (Tink with Conscrypt on x86_64,
  # BouncyCastle fallback on macOS arm64) needs verification on every shipped target. The init
  # block in CryptoBootstrap runs an RFC 8452 vector check; running tests on macos-14 (ARM)
  # proves BC's GCM-SIV is byte-compatible with Android Tink's Conscrypt output.
  #
  # macos-15-intel (Intel) is excluded here on purpose — GitHub's Intel-runner pool is small
  # and PRs routinely wait 30+ minutes for one. The Intel .dmg is still built at release time
  # in `release-tag.yml` / `release-canary.yml`, where slow queue is tolerable. Crypto is the
  # same provider stack on Intel and ARM macOS (Conscrypt loads its x64 native lib on Intel,
  # BC fallback on ARM), so exercising one is enough to flag regressions in the JVM/Compose
  # layer. Note: macos-13 was retired by GitHub on 2025-12-08; macos-15-intel is the
  # replacement (and last Intel label, retiring Aug 2027).
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    env:
      # Backtick test names contain UTF-8 chars; the JVM needs a UTF-8 locale to write the
      # .class files. Linux runners default to POSIX (ASCII) in containers; macOS/Windows are
      # already UTF-8.
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup project and build environment
        uses: ./.github/actions/common-setup

      - name: Check code and run tests
        shell: bash
        run: ./gradlew check

      # Windows-only: the Gradle daemon keeps an OS-level lock on files like
      # caches/modules-2/modules-2.lock after the build step returns, which makes the
      # Post Setup tar step exit 2 with "Device or resource busy". On Linux/macOS those
      # locks are advisory and tar reads through them — Windows lock semantics don't.
      # Stopping the daemon here releases the locks before actions/cache scans the
      # cache directory, so the Windows ~/.gradle/caches cache actually saves between
      # runs instead of silently re-downloading every dep.
      - name: Stop Gradle daemon (Windows)
        if: ${{ always() && runner.os == 'Windows' }}
        continue-on-error: true
        shell: bash
        run: ./gradlew --stop

      - name: Upload Kover coverage report
        # One coverage upload is enough — coverage doesn't differ across OSes. Pin it to the
        # Ubuntu runner so PR reviewers know which artifact to look at.
        if: matrix.os == 'ubuntu-24.04' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: kover-html
          path: build/reports/kover/html
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: build/reports/tests/test
          if-no-files-found: warn

  smoke:
    name: Smoke (real sync-server)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DISPLAY: ':99'
      SYNC_SERVER_URL: 'http://127.0.0.1:18080'
      SYNC_SERVER_URL_B: 'http://127.0.0.1:18081'
      RPC_PORT: '53124'
      RUNTIME_DIR: ${{ github.workspace }}/build/multi-connector-smoke
      APP_LOG: ${{ github.workspace }}/build/multi-connector-smoke/app.log
      LINK_FILE_A: ${{ github.workspace }}/build/multi-connector-smoke/link-a.txt
      LINK_FILE_B: ${{ github.workspace }}/build/multi-connector-smoke/link-b.txt
      STATE_DIR: ${{ github.workspace }}/build/multi-connector-smoke/states
      XDG_CONFIG_HOME: ${{ github.workspace }}/build/multi-connector-smoke/xdg-config
      XDG_DATA_HOME: ${{ github.workspace }}/build/multi-connector-smoke/xdg-data
      PEER_LABEL_A: 'Pixel-A'
      PEER_LABEL_B: 'Pixel-B'
      DESKTOP_LABEL: 'Multi Smoke Desktop'
    # Track octi-server's rolling canary tag so this job surfaces wire-format drift the day it
    # lands on octi-server main, without anyone needing to bump a pinned digest. Trade-off: a
    # failure here may indicate either a desktop regression OR an upstream change — check
    # octi-server main if the failure is unexplained. The tag is republished on every server
    # main push; GH Actions pulls the latest at job start.
    #
    # Two service containers are brought up so MultiConnectorWireSmokeTest can exercise the
    # two-server foundation that the multi-connector feature builds on. Both pull the same
    # `:canary` tag so cross-server tests run against matching server versions; mismatched
    # versions would conflate upstream drift with multi-connector regressions.
    services:
      sync-server:
        image: ghcr.io/d4rken-org/octi-server:canary
        ports:
          - 18080:8080
      sync-server-b:
        image: ghcr.io/d4rken-org/octi-server:canary
        ports:
          - 18081:8080
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup project and build environment
        uses: ./.github/actions/common-setup

      - name: Install runtime smoke dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            xvfb x11-utils xauth xfonts-base \
            libsecret-tools gnome-keyring dbus-x11 \
            python3

      - name: Wait for sync-servers
        shell: bash
        run: |
          set -euo pipefail
          for url in "$SYNC_SERVER_URL/v1/status" "$SYNC_SERVER_URL_B/v1/status"; do
            ready=0
            for attempt in $(seq 1 30); do
              if curl -sf "$url" > /dev/null; then
                echo "$url up after ${attempt}s"
                ready=1
                break
              fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then
              echo "$url did not respond within 30s" >&2
              docker logs ${{ job.services.sync-server.id }} || true
              docker logs ${{ job.services.sync-server-b.id }} || true
              exit 1
            fi
          done

      - name: Run smoke suite
        env:
          SMOKE_SERVER_URL: ${{ env.SYNC_SERVER_URL }}
          SMOKE_SERVER_URL_B: ${{ env.SYNC_SERVER_URL_B }}
        run: ./gradlew smokeTest

      - name: Start D-Bus session + unlock gnome-keyring
        shell: bash
        run: |
          set -euo pipefail
          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> "$GITHUB_ENV"
          printf '\n' | gnome-keyring-daemon --daemonize --unlock --components=secrets >/dev/null
          echo -n "probe-value" | secret-tool store --label=probe service multi-connector-smoke key probe
          got=$(secret-tool lookup service multi-connector-smoke key probe)
          [[ "$got" == "probe-value" ]] || { echo "::error::secret-tool round-trip failed: '$got'" >&2; exit 1; }
          secret-tool clear service multi-connector-smoke key probe
          echo "gnome-keyring + secret-tool round-trip OK"

      - name: Start Xvfb
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNTIME_DIR"
          Xvfb :99 -screen 0 1200x820x24 -ac -nolisten tcp >"$RUNTIME_DIR/xvfb.log" 2>&1 &
          echo $! > "$RUNTIME_DIR/xvfb.pid"
          for attempt in $(seq 1 20); do
            if xdpyinfo >/dev/null 2>&1; then
              echo "Xvfb up after ${attempt} attempts"
              exit 0
            fi
            if [[ ! -d /proc/$(cat "$RUNTIME_DIR/xvfb.pid") ]]; then
              echo "::error::Xvfb process exited before reaching ready state" >&2
              cat "$RUNTIME_DIR/xvfb.log" >&2 || true
              exit 1
            fi
            sleep 1
          done
          echo "::error::Xvfb did not respond on :99 within 20s" >&2
          cat "$RUNTIME_DIR/xvfb.log" >&2 || true
          exit 1

      - name: Seed two phantom peers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNTIME_DIR"
          ./gradlew --no-daemon bootstrapScreenshotPeer \
            --args="--server $SYNC_SERVER_URL --label $PEER_LABEL_A --output $LINK_FILE_A"
          ./gradlew --no-daemon bootstrapScreenshotPeer \
            --args="--server $SYNC_SERVER_URL_B --label $PEER_LABEL_B --output $LINK_FILE_B"

      - name: Build runnable distributable
        shell: bash
        run: ./gradlew --no-daemon createDistributable

      - name: Launch desktop app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNTIME_DIR" "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          : > "$APP_LOG"
          nohup ./build/compose/binaries/main/app/Octi/bin/Octi \
            --enable-debug-rpc --debug-rpc-port "$RPC_PORT" \
            >"$APP_LOG" 2>&1 &
          echo $! > "$RUNTIME_DIR/app.pid"

      - name: Run multi-connector runtime smoke
        shell: bash
        run: ./.github/scripts/multi-connector-smoke.sh

      - name: Restart desktop app
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "$RUNTIME_DIR/app.pid" ]]; then
            kill "$(cat "$RUNTIME_DIR/app.pid")" || true
          fi
          for _ in $(seq 1 20); do
            if [[ ! -f "$RUNTIME_DIR/app.pid" ]] || ! kill -0 "$(cat "$RUNTIME_DIR/app.pid")" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if [[ -f "$RUNTIME_DIR/app.pid" ]] && kill -0 "$(cat "$RUNTIME_DIR/app.pid")" 2>/dev/null; then
            echo "::warning::desktop process did not stop after SIGTERM; sending SIGKILL"
            kill -9 "$(cat "$RUNTIME_DIR/app.pid")" || true
          fi
          printf '\n==== restart for persisted multi-connector smoke ====\n' >> "$APP_LOG"
          nohup ./build/compose/binaries/main/app/Octi/bin/Octi \
            --enable-debug-rpc --debug-rpc-port "$RPC_PORT" \
            >>"$APP_LOG" 2>&1 &
          echo $! > "$RUNTIME_DIR/app.pid"

      - name: Verify persisted multi-connector state
        shell: bash
        env:
          MULTI_CONNECTOR_SKIP_LINK: '1'
        run: ./.github/scripts/multi-connector-smoke.sh

      - name: Stop desktop app and Xvfb
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -f "$RUNTIME_DIR/app.pid" ]]; then
            kill "$(cat "$RUNTIME_DIR/app.pid")" || true
          fi
          if [[ -f "$RUNTIME_DIR/xvfb.pid" ]]; then
            kill "$(cat "$RUNTIME_DIR/xvfb.pid")" || true
          fi

      - name: Dump sync-server logs on failure
        if: failure()
        run: |
          docker logs ${{ job.services.sync-server.id }} || true
          docker logs ${{ job.services.sync-server-b.id }} || true

      - name: Upload runtime smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: multi-connector-runtime-smoke
          path: |
            build/multi-connector-smoke/app.log
            build/multi-connector-smoke/xvfb.log
            build/multi-connector-smoke/states
          if-no-files-found: warn

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: smoke-test-results
          path: build/reports/tests/smokeTest
          if-no-files-found: warn
