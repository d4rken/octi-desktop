name: Code tests & eval

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # Cross-OS matrix is intentional — the desktop's crypto stack (Tink with Conscrypt on x86_64,
  # BouncyCastle fallback on macOS arm64) needs verification on every shipped target. The init
  # block in CryptoBootstrap runs an RFC 8452 vector check; running tests on macos-14 (ARM)
  # proves BC's GCM-SIV is byte-compatible with Android Tink's Conscrypt output.
  #
  # macos-15-intel (Intel) is excluded here on purpose — GitHub's Intel-runner pool is small
  # and PRs routinely wait 30+ minutes for one. The Intel .dmg is still built at release time
  # in `release-tag.yml` / `release-canary.yml`, where slow queue is tolerable. Crypto is the
  # same provider stack on Intel and ARM macOS (Conscrypt loads its x64 native lib on Intel,
  # BC fallback on ARM), so exercising one is enough to flag regressions in the JVM/Compose
  # layer. Note: macos-13 was retired by GitHub on 2025-12-08; macos-15-intel is the
  # replacement (and last Intel label, retiring Aug 2027).
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    env:
      # Backtick test names contain UTF-8 chars; the JVM needs a UTF-8 locale to write the
      # .class files. Linux runners default to POSIX (ASCII) in containers; macOS/Windows are
      # already UTF-8.
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup project and build environment
        uses: ./.github/actions/common-setup

      - name: Check code and run tests
        shell: bash
        run: ./gradlew check

      - name: Upload Kover coverage report
        # One coverage upload is enough — coverage doesn't differ across OSes. Pin it to the
        # Ubuntu runner so PR reviewers know which artifact to look at.
        if: matrix.os == 'ubuntu-24.04' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: kover-html
          path: build/reports/kover/html
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: build/reports/tests/test
          if-no-files-found: warn

  smoke:
    name: Smoke (real sync-server)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Pin sync-server by digest so this test can never silently shift if the tag is republished.
    # This digest is octi-server v1.1.0 — same image octi-web pins.
    services:
      sync-server:
        image: ghcr.io/d4rken-org/octi-server@sha256:3829efba5ca5a4d407a0d0a048b8d0c20264ad2f9e389aa087c857ea0d0bddaa
        ports:
          - 18080:8080
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup project and build environment
        uses: ./.github/actions/common-setup

      - name: Wait for sync-server
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/v1/status > /dev/null; then
              echo "sync-server up after ${attempt}s"
              exit 0
            fi
            sleep 1
          done
          echo "sync-server did not respond within 30s" >&2
          docker logs ${{ job.services.sync-server.id }} || true
          exit 1

      - name: Run smoke suite
        env:
          SMOKE_SERVER_URL: http://127.0.0.1:18080
        run: ./gradlew smokeTest

      - name: Dump sync-server logs on failure
        if: failure()
        run: docker logs ${{ job.services.sync-server.id }} || true

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: smoke-test-results
          path: build/reports/tests/smokeTest
          if-no-files-found: warn
