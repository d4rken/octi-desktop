name: Tagged releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Defence-in-depth: even though the only legitimate source of a v* tag is `release-prepare.yml`
  # (which validates everything upfront), re-validate here in case someone hand-pushes a tag.
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "$TAG" | grep -qE '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(rc|beta)(0|[1-9][0-9]*))?$' || {
            echo "::error::Tag '$TAG' does not match expected format vX.Y.Z[-rcN|-betaN]. Releases must be cut via the 'Release prepare' workflow."
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check gradle.properties version matches tag
        id: check
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          count=$(grep -cE '^version=' gradle.properties || true)
          [[ "$count" == "1" ]] || { echo "::error::expected exactly one 'version=' line in gradle.properties, found $count"; exit 1; }
          file_version=$(awk -F= '$1=="version"{print $2}' gradle.properties)
          tag_version="${TAG#v}"
          [[ "$file_version" == "$tag_version" ]] || {
            echo "::error::gradle.properties version '$file_version' does not match tag '$TAG'. Releases must be cut via the 'Release prepare' workflow."
            exit 1
          }
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

  # Per-OS jpackage matrix lives in the reusable build-installers.yml so it can be shared
  # with other publish flows. Stable callers pass the defaults (channel=stable, no version
  # override) — the gradle invocations and produced filenames are identical to the previous
  # inline jobs.
  build:
    name: Build installers
    needs: [validate-tag]
    uses: ./.github/workflows/build-installers.yml
    with:
      channel: stable
      version-override: ""
      artifact-prefix: Octi-${{ needs.validate-tag.outputs.version }}

  release-github:
    name: Create GitHub release
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v5.0.0
        with:
          path: artifacts

      - name: Flatten + compute SHA256 checksums
        run: |
          set -euo pipefail
          mkdir -p release
          # Flatten artifact-name subdirs into one directory for upload.
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.tar.gz' -o -name '*.dmg' -o -name '*.msi' \) -exec cp {} release/ \;
          cd release
          ls -la
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3.0.0
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # generate_release_notes uses PR titles for PRs merged since the last tag — this is
          # exactly the user-facing changelog we want. PRs landing without good titles produce
          # ugly notes; reviewers should fix titles before merge.
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
