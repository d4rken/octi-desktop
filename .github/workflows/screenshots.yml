name: Update screenshots

# Manually-triggered workflow that regenerates README screenshots. Boots a real sync-server in
# a service container, seeds a phantom phone peer, launches the desktop app under Xvfb with the
# debug RPC enabled, walks through screens, and opens a PR with the captured PNGs.
#
# Why a PR (not a direct push)? Screenshot regressions are visual — a maintainer should always
# eyeball the new images before they replace what's checked in. The PR diff makes that review
# trivial (GitHub renders before/after).

on:
  workflow_dispatch:
    inputs:
      sync_server_digest:
        description: 'Pin sync-server by digest. Leave blank to use the default-tracked digest.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  capture:
    name: Capture & open PR
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    services:
      sync-server:
        # Same digest pinning convention used by octi-web's smoke test. Override via input when
        # targeting a different release; refresh the default deliberately when needed.
        image: ghcr.io/d4rken-org/octi-server@sha256:bdb7a647a4d74ad39d17170080d9aacc94159f412b147372825c23e7067fa0b7
        ports:
          - 18080:8080
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DISPLAY: ':99'
      SYNC_SERVER_URL: 'http://127.0.0.1:18080'
      RPC_PORT: '53123'
      APP_LOG: ${{ github.workspace }}/build/screenshots/app.log
      LINK_FILE: ${{ github.workspace }}/build/screenshots/link.txt
      OUT_DIR: ${{ github.workspace }}/build/screenshots/captured
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup project and build environment
        uses: ./.github/actions/common-setup

      - name: Install Xvfb + screenshot tooling
        run: |
          set -euo pipefail
          sudo apt-get update -y
          # x11-utils brings in xdpyinfo (Ubuntu's xvfb metapackage doesn't depend on it).
          # xauth + xfonts-base are required by Xvfb's bind-time initialization; without them
          # Xvfb writes nothing to stderr and exits before the first xdpyinfo poll, so the
          # failure looks like "did not start" with an empty log.
          # gnome-keyring + dbus-x11 are what libsecret talks to behind `secret-tool`. The
          # desktop's LibsecretKeystore writes credentials there on link; without a running
          # daemon + DBus session, link rolls back with `KeystoreFailureRolledBack`.
          sudo apt-get install -y --no-install-recommends \
            xvfb x11-utils xauth xfonts-base \
            libsecret-tools gnome-keyring dbus-x11 \
            imagemagick python3

      - name: Wait for sync-server
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl -sf "$SYNC_SERVER_URL/v1/status" >/dev/null; then
              echo "sync-server up after ${attempt}s"; exit 0
            fi
            sleep 1
          done
          echo "::error::sync-server did not respond within 30s" >&2
          docker logs ${{ job.services.sync-server.id }} || true
          exit 1

      - name: Start D-Bus session + unlock gnome-keyring
        # The desktop's LibsecretKeystore shells out to `secret-tool`, which talks to a Secret
        # Service implementation over D-Bus. On a fresh runner neither is running, so the link
        # step fails with KeystoreFailureRolledBack. Start both, unlock the default collection
        # with an empty password, and propagate DBUS_SESSION_BUS_ADDRESS via $GITHUB_ENV so the
        # app launched in a later step inherits the connection.
        run: |
          set -euo pipefail
          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> "$GITHUB_ENV"
          # --unlock with an empty password creates+unlocks the default collection.
          # --components=secrets skips ssh/pkcs11 (we don't need them). With only the secrets
          # component, the daemon's stdout is empty — there's no IPC control socket to export
          # because libsecret talks to it over DBus. Discard stdout; the secret-tool smoke
          # test below is the real verification.
          printf '\n' | gnome-keyring-daemon --daemonize --unlock --components=secrets >/dev/null
          # Smoke test: write + read a value via secret-tool. Fails loudly here if the daemon
          # came up but the DBus connection is broken — easier to debug than a later linking
          # rollback.
          echo -n "probe-value" | secret-tool store --label=probe service screenshot-ci key probe
          got=$(secret-tool lookup service screenshot-ci key probe)
          [[ "$got" == "probe-value" ]] || { echo "::error::secret-tool round-trip failed: '$got'" >&2; exit 1; }
          secret-tool clear service screenshot-ci key probe
          echo "gnome-keyring + secret-tool round-trip OK"

      - name: Start Xvfb
        run: |
          set -euo pipefail
          mkdir -p build/screenshots
          # Headroom around the 1024x720 Compose window: without a WM, AWT picks the window
          # position on its own, and on the first run that landed it offset enough that the
          # right edge clipped a few dozen pixels. Give it ~100px slack on each axis; the
          # frame-aware DebugScreenshot crops to the actual window bounds so the surplus is
          # never visible in captured images.
          # -ac disables host-based access control (no .Xauthority round-trip needed for our
          # in-process AWT client); -nolisten tcp keeps the X socket on a local unix path only.
          Xvfb :99 -screen 0 1200x820x24 -ac -nolisten tcp >build/screenshots/xvfb.log 2>&1 &
          echo $! > build/screenshots/xvfb.pid
          # Give the X server a moment to bind, then verify with a real X call.
          for attempt in $(seq 1 20); do
            if xdpyinfo >/dev/null 2>&1; then
              echo "Xvfb up after ${attempt} attempts"
              exit 0
            fi
            # If the Xvfb process has already died, surface that immediately rather than
            # spinning for 20s on a dead PID.
            if [[ ! -d /proc/$(cat build/screenshots/xvfb.pid) ]]; then
              echo "::error::Xvfb process exited before reaching ready state" >&2
              cat build/screenshots/xvfb.log >&2 || true
              exit 1
            fi
            sleep 1
          done
          echo "::error::Xvfb did not respond on :99 within 20s" >&2
          cat build/screenshots/xvfb.log >&2 || true
          ps -fp "$(cat build/screenshots/xvfb.pid)" >&2 || true
          exit 1

      - name: Seed phantom peer
        run: |
          set -euo pipefail
          ./gradlew --no-daemon bootstrapScreenshotPeer \
            --args="--server $SYNC_SERVER_URL --label Pixel --output $LINK_FILE"

      - name: Build runnable distributable
        run: |
          set -euo pipefail
          # Build once so the next step can launch the binary directly. Going through
          # `./gradlew run` worked but Gradle's logger ate the JVM's stdout — the
          # DEBUG_RPC banner with the auth token never reached $APP_LOG and the capture
          # script timed out grepping for it.
          ./gradlew --no-daemon createDistributable

      - name: Launch desktop app
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$APP_LOG")"
          # Run the launcher script directly; its stdout/stderr go straight to our redirect
          # without Gradle's logger in the middle.
          nohup ./build/compose/binaries/main/app/Octi/bin/Octi \
            --enable-debug-rpc --debug-rpc-port "$RPC_PORT" \
            >"$APP_LOG" 2>&1 &
          echo $! > build/screenshots/app.pid

      - name: Capture screenshots
        run: |
          set -euo pipefail
          ./.github/scripts/capture-screenshots.sh

      - name: Copy captured screenshots into the repo
        run: |
          set -euo pipefail
          mkdir -p fastlane/metadata/desktop/screenshots
          # Overwrite (intentional) — this workflow is the only producer.
          cp "$OUT_DIR"/*.png fastlane/metadata/desktop/screenshots/
          ls -la fastlane/metadata/desktop/screenshots

      - name: Stop desktop app
        if: always()
        run: |
          set +e
          if [[ -f build/screenshots/app.pid ]]; then
            kill "$(cat build/screenshots/app.pid)" || true
          fi
          if [[ -f build/screenshots/xvfb.pid ]]; then
            kill "$(cat build/screenshots/xvfb.pid)" || true
          fi

      - name: Upload raw artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: screenshot-debug
          path: |
            build/screenshots/app.log
            build/screenshots/xvfb.log
            build/screenshots/captured
          if-no-files-found: warn

      - name: Mint d4rken-org-releaser App token
        # PRs created with the default GITHUB_TOKEN don't trigger downstream workflows
        # (GitHub's anti-recursion safeguard). So required `pull_request` checks on this
        # PR — code-checks.yml etc. — never fire and the PR sits forever in "Waiting for
        # status to be reported". Using an App token instead bypasses that suppression:
        # events created by an App are treated as external for the purpose of triggering
        # workflows. The same App + secrets are already used by release-canary.yml and
        # release-prepare.yml.
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 #v3.1.1
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Resolve bot identity
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          user_id=$(gh api "/users/${APP_SLUG}%5Bbot%5D" --jq .id)
          echo "user_name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "user_email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Push branch + open PR via gh CLI
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_USER_NAME: ${{ steps.bot.outputs.user_name }}
          GIT_USER_EMAIL: ${{ steps.bot.outputs.user_email }}
        run: |
          set -euo pipefail
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          gh auth setup-git

          BRANCH="screenshots/refresh"
          git checkout -b "$BRANCH"
          git add fastlane/metadata/desktop/screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes vs. main — nothing to PR."
            exit 0
          fi
          git commit -m "Refresh README screenshots"
          # Force-push: subsequent runs overwrite the same branch, which updates an open PR in
          # place rather than spawning a fresh one per run.
          git push --force --set-upstream origin "$BRANCH"

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already open for $BRANCH; pushed an update."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "Refresh README screenshots" \
              --body "Automated refresh from the \`Update screenshots\` workflow. Review the diffs and merge if the new shots look right."
          fi
