# - The numericVersion passed to jpackage's packageVersion (suffix-stripped in build.gradle.kts)
# - BuildConfig.VERSION generated at build time (DeviceMetadataProvider.APP_VERSION reads it)
# Bumped exclusively by the release-prepare.yml workflow.
version=0.1.0
